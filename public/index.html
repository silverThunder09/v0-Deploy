<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>맛집 관리</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',
            secondary: '#64748b',
          }
        }
      }
    } 
  </script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <!-- 헤더 -->
  <header class="header">
    <div class="header-container">
      <div class="header-left">
        <div class="logo">
          <i class="fas fa-utensils"></i>
        </div>
        <div class="header-title">
          <h1>맛집 관리</h1>
          <p>나만의 맛집 컬렉션</p>
        </div>
      </div>
      <button class="btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addPlaceModal">
        <i class="fas fa-plus"></i>
        <span>새 맛집 등록</span>
      </button>
    </div>
  </header>

  <!-- 메인 컨텐츠 -->
  <main class="main-content">
    <!-- 필터 영역 -->
    <div class="filter-section">
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">전체</button>
        <button class="filter-tab" data-filter="한식">한식</button>
        <button class="filter-tab" data-filter="중식">중식</button>
        <button class="filter-tab" data-filter="일식">일식</button>
        <button class="filter-tab" data-filter="양식">양식</button>
        <button class="filter-tab" data-filter="카페">카페</button>
      </div>
      <div class="stats-mini">
        <span id="displayCount">0</span>개의 맛집
      </div>
    </div>

    <!-- 카드 목록 -->
    <div class="cards-grid" id="placesContainer">
      <!-- 맛집 카드들이 여기에 렌더링됩니다 -->
    </div>
  </main>

  <!-- 등록 모달 -->
  <div class="modal fade" id="addPlaceModal" tabindex="-1" aria-labelledby="addPlaceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content custom-modal">
        <div class="modal-header-custom">
          <div>
            <h5 class="modal-title-custom">새 맛집 등록</h5>
            <p class="modal-subtitle"> 맛집 정보를 입력해주세요 </p>
          </div>
          <button type="button" class="btn-close-custom" data-bs-dismiss="modal" aria-label="Close">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body-custom">
          <form id="addPlaceForm">
            <div class="form-group">
              <label for="addName">가게 이름</label>
              <div class="d-flex gap-2">
                <input type="text" class="form-input-custom" id="addName" placeholder="예: 명동교자" required>
                <button type="button" class="btn btn-outline-primary" id="searchPlaceByNameBtn">이름 검색</button>
              </div>
              <small class="text-muted">가게 이름으로 검색한 뒤, 지도에서 위치를 한 번 더 클릭해 확정하세요.</small>
            </div>

            <div class="form-group">
              <label>검색 결과</label>
              <div id="placeSearchResult" class="border rounded p-2" style="max-height:160px; overflow-y:auto; background:#fff;">
                <div class="text-muted small">가게 이름으로 검색하면 결과가 여기에 표시됩니다.</div>
              </div>
            </div>

            <div class="form-group">
              <label>지도에서 위치 선택</label>
              <div id="addMap" style="width:100%; height:320px; border-radius:12px; overflow:hidden; border:1px solid #e5e7eb;"></div>
              <small class="text-muted">검색 결과를 누르거나 지도를 클릭하면 주소가 자동 반영됩니다.</small>
            </div>

            <input type="hidden" id="addLat">
            <input type="hidden" id="addLng">

            
            <div class="form-group">
              <label for="addAddress">주소</label>
              <input type="text" class="form-input-custom" id="addAddress" placeholder="예: 서울특별시 중구 명동10길 29" required>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="addCategory">카테고리</label>
                <select class="form-select-custom" id="addCategory" required>
                  <option value="">선택</option>
                  <option value="한식">한식</option>
                  <option value="중식">중식</option>
                  <option value="일식">일식</option>
                  <option value="양식">양식</option>
                  <option value="카페">카페</option>
                  <option value="기타">기타</option>
                </select>
              </div>
              
              <div class="form-group">
                <label for="addCall">전화번호</label>
                <input type="tel" class="form-input-custom" id="addCall" placeholder="02-0000-0000" required>
              </div>
            </div>
            
            <div class="form-group">
              <label>별점</label>
              <div class="star-rating-input">
                <input type="radio" id="addStar5" name="addRating" value="5">
                <label for="addStar5"><i class="fas fa-star"></i></label>
                <input type="radio" id="addStar4" name="addRating" value="4">
                <label for="addStar4"><i class="fas fa-star"></i></label>
                <input type="radio" id="addStar3" name="addRating" value="3">
                <label for="addStar3"><i class="fas fa-star"></i></label>
                <input type="radio" id="addStar2" name="addRating" value="2">
                <label for="addStar2"><i class="fas fa-star"></i></label>
                <input type="radio" id="addStar1" name="addRating" value="1">
                <label for="addStar1"><i class="fas fa-star"></i></label>
              </div>
            </div>
            
            <button type="submit" class="btn-submit">등록하기</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- 수정 모달 -->
  <div class="modal fade" id="editPlaceModal" tabindex="-1" aria-labelledby="editPlaceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content custom-modal">
        <div class="modal-header-custom">
          <div>
            <h5 class="modal-title-custom">맛집 정보 수정</h5>
            <p class="modal-subtitle">수정할 정보를 입력해주세요</p>
          </div>
          <button type="button" class="btn-close-custom" data-bs-dismiss="modal" aria-label="Close">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body-custom">
          <form id="editPlaceForm">
            <div class="form-group">
              <label for="editName">가게 이름</label>
              <input type="text" class="form-input-custom" id="editName" placeholder="예: 명동교자" required>
            </div>
            
            <div class="form-group">
              <label for="editAddress">주소</label>
              <input type="text" class="form-input-custom" id="editAddress" placeholder="예: 서울특별시 중구 명동10길 29" required>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="editCategory">카테고리</label>
                <select class="form-select-custom" id="editCategory" required>
                  <option value="">선택</option>
                  <option value="한식">한식</option>
                  <option value="중식">중식</option>
                  <option value="일식">일식</option>
                  <option value="양식">양식</option>
                  <option value="카페">카페</option>
                  <option value="기타">기타</option>
                </select>
              </div>
              
              <div class="form-group">
                <label for="editCall">전화번호</label>
                <input type="tel" class="form-input-custom" id="editCall" placeholder="02-0000-0000" required>
              </div>
            </div>
            
            <div class="form-group">
              <label>별점</label>
              <div class="star-rating-input">
                <input type="radio" id="editStar5" name="editRating" value="5">
                <label for="editStar5"><i class="fas fa-star"></i></label>
                <input type="radio" id="editStar4" name="editRating" value="4">
                <label for="editStar4"><i class="fas fa-star"></i></label>
                <input type="radio" id="editStar3" name="editRating" value="3">
                <label for="editStar3"><i class="fas fa-star"></i></label>
                <input type="radio" id="editStar2" name="editRating" value="2">
                <label for="editStar2"><i class="fas fa-star"></i></label>
                <input type="radio" id="editStar1" name="editRating" value="1">
                <label for="editStar1"><i class="fas fa-star"></i></label>
              </div>
            </div>
            
            <button type="submit" class="btn-submit">수정하기</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- KakaoMap API-->
   <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=fe03a68ae234e6c2df3de6e44f4bd9eb&libraries=services"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <!-- API Endpoint -->
  <script src="./mockapi/endpoint.js"></script>
  
  <!-- App JS -->
  <script src="./js/app.js"></script>
</body>
</html>
